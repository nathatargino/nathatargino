name: Generate Stats Images

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          ref: main
          fetch-depth: 0

      - name: Generate stats images
        run: |
          mkdir -p generated

          curl -L -o ./generated/overview.svg \
            "https://github-readme-stats-eight-theta.vercel.app/api?username=nathatargino&theme=highcontrast&show_icons=true"

          curl -L -o ./generated/languages.svg \
            "https://github-readme-stats-eight-theta.vercel.app/api/top-langs?username=nathatargino&layout=compact&langs_count=8&theme=highcontrast"

          echo "Overview SVG:"
          head -n 1 ./generated/overview.svg

          echo "Languages SVG:"
          head -n 1 ./generated/languages.svg

      - name: Commit and push generated files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add generated/*.svg

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update GitHub stats cards"
            git push origin main
          fi
